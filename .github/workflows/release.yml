name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Package Unix
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/release/atom dist/atom-${{ runner.os }}
      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\release\atom.exe dist\atom-Windows.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atom-${{ runner.os }}
          path: dist/*
