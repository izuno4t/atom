name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - name: Install documentation tools
        run: npm install -g markdownlint-cli2 cspell
      - name: Verify
        run: make verify

  build:
    needs: verify
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26
          - windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --locked
      - name: Package binary tarball
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          target="$(rustc -vV | awk '/host:/ {print $2}')"
          bin="atom"
          [ "${RUNNER_OS}" = "Windows" ] && bin="atom.exe"
          pkg="atom-${version}-${target}"
          mkdir -p "dist/${pkg}"
          cp "target/release/${bin}" "dist/${pkg}/${bin}"
          cp config.toml.example "dist/${pkg}/config.toml.example"
          tar -C dist -czf "dist/${pkg}.tar.gz" "${pkg}"
          (
            cd dist
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256"
            else
              shasum -a 256 "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256"
            fi
          )
      - name: List packages
        shell: bash
        run: find dist -maxdepth 2 -type f -print
      - name: Publish release asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(dist/*.tar.gz dist/*.sha256)
          test "${#files[@]}" -gt 0
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber

  update-homebrew-tap:
    needs: build
    runs-on: ubuntu-latest
    env:
      TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN || secrets.TAP_GITHUB_TOKEN }}
    steps:
      - name: Check tap token
        run: |
          test -n "$TAP_GITHUB_TOKEN" || {
            echo "HOMEBREW_TAP_GITHUB_TOKEN or TAP_GITHUB_TOKEN is required to update izuno4t/homebrew-tap" >&2
            exit 1
          }
      - uses: actions/checkout@v5
      - name: Update tap formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          mac_tar="atom-${version}-aarch64-apple-darwin.tar.gz"
          linux_tar="atom-${version}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" \
            --pattern "${mac_tar}.sha256" \
            --pattern "${linux_tar}.sha256" \
            --dir dist --clobber
          sha256_mac="$(cut -d ' ' -f 1 "dist/${mac_tar}.sha256")"
          sha256_linux="$(cut -d ' ' -f 1 "dist/${linux_tar}.sha256")"
          test -n "$sha256_mac" && test -n "$sha256_linux"
          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/izuno4t/homebrew-tap.git" tap
          cd tap
          cat > Formula/atom.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          class Atom < Formula
            desc "Anything to Markdown"
            homepage "https://github.com/izuno4t/atom"
            license "MIT"
            version "${version}"

            on_macos do
              on_arm do
                url "https://github.com/izuno4t/atom/releases/download/v${version}/${mac_tar}"
                sha256 "${sha256_mac}"
              end
              on_intel do
                odie "atom is not available for Intel macOS"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/izuno4t/atom/releases/download/v${version}/${linux_tar}"
                sha256 "${sha256_linux}"
              end
            end

            def install
              bin.install "atom"
              pkgshare.install "config.toml.example"
            end

            test do
              assert_match "atom ${version}", shell_output("#{bin}/atom --version")
              assert_path_exists pkgshare/"config.toml.example"
            end
          end
          EOF
          ruby -c Formula/atom.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/atom.rb
          git commit -m "Update atom to ${version}" || exit 0
          git push origin main
